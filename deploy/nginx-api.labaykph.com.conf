# Nginx site config for api.labaykph.com (Laravel headless API)
# Point document root to the Laravel /public folder — NOT the project root.

server {
    listen 80;
    listen 443 ssl http2;
    server_name api.labaykph.com;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    root /path/to/labayk-api-headless-v13/public;
    index index.php;

    charset utf-8;
    client_max_body_size 64M;

    # CORS for the PWA (belt-and-suspenders; Laravel config/cors.php also handles this)
    set $cors_origin "";
    if ($http_origin ~* ^https://([a-z0-9-]+\.)?labaykph\.com$) {
        set $cors_origin $http_origin;
    }

    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN" always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;  # adjust PHP version/socket
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Vary Origin always;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
